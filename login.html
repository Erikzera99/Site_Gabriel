<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css">
    <link rel="shortcut icon" type="image/x-icon" href="./imagens/Prime.ico">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <title>Login JS</title>
</head>


<body>

<header class="menu-principal">
        <div class="logo">
            <img src="./imagens/Prime.png" alt="LOGO DA LOJA">
        </div>
</header>

    <div class="container">
        <div class="card">
    <form>

        <h1>Entrar</h1>
        <div class="label-float">
        <input type="text" placeholder="" id="login" required />
        <label id="userLabel" for="Login">Login</label>
        </div>

        <div class="label-float">
        <input type="password" placeholder="" id="senha" required />
        <label id="senhaLabel" for="senha">Senha</label>
        <i class="fa fa-eye" aria-hidden="true"></i>
        </div>
        
        <div class="button">
        <input type="submit" value="Entrar" onclick="logar(); return false">
        </div>
        <hr>
        </div>
    </form>

    <script src="./login.js"></script>

</body>
</html>
